<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxury Seat - Catálogo</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #141414; --border: #2a2a2a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        .screen { width: 100%; max-width: 500px; display: none; flex-direction: column; align-items: center; padding: 30px 20px; }
        .screen.active { display: flex; }

        .logo { font-size: 28px; font-weight: 900; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
        .logo span { color: white; }
        .subtitle { color: #555; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }

        .brand-card { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin-bottom: 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .brand-card:active { background: #222; border-color: var(--gold); }
        .brand-card h2 { font-size: 20px; letter-spacing: 4px; color: var(--gold); }
        .brand-card.coming { opacity: 0.4; cursor: default; }

        .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; margin-bottom: 30px; }
        .model-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; }
        .model-box:active { border-color: var(--gold); }
        .model-thumb { width: 100%; height: 130px; object-fit: contain; background: #0e0e0e; display: block; border-bottom: 1px solid var(--border); }
        .model-label { padding: 12px 10px; font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 1px; text-align: center; text-transform: uppercase; }

        .section-title { font-size: 18px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; text-align: center; }
        .section-sub { font-size: 12px; color: #555; letter-spacing: 1px; margin-bottom: 24px; text-align: center; }

        .viewer-wrap { width: 100%; position: relative; background: #0e0e0e; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; touch-action: none; user-select: none; min-height: 260px; display: flex; align-items: center; justify-content: center; }
        #viewer-img { width: 100%; display: block; border-radius: 20px; pointer-events: none; }
        .viewer-hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: var(--gold); font-size: 11px; letter-spacing: 2px; padding: 5px 14px; border-radius: 20px; white-space: nowrap; pointer-events: none; }

        .frame-bar { width: 100%; display: flex; justify-content: center; gap: 8px; margin-top: 14px; }
        .frame-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; transition: background 0.2s, transform 0.2s; }
        .frame-dot.active { background: var(--gold); transform: scale(1.4); }

        .spinner { position: absolute; width: 36px; height: 36px; border: 2px solid #222; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-back { margin-top: 28px; background: none; border: 1px solid #333; color: #666; padding: 10px 28px; border-radius: 8px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        .btn-back:active { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<div id="screen-brands" class="screen active">
    <div class="logo">LUXURY <span>SEAT</span></div>
    <p class="subtitle">Asientos de moto personalizados</p>
    <div class="brand-card" onclick="showModels()">
        <h2>YAMAHA</h2>
        <span style="color:#555;">›</span>
    </div>
    <div class="brand-card coming">
        <h2>HONDA</h2>
        <span style="color:#333; font-size:11px; letter-spacing:1px;">PRÓXIMAMENTE</span>
    </div>
    <div class="brand-card coming">
        <h2>SUZUKI</h2>
        <span style="color:#333; font-size:11px; letter-spacing:1px;">PRÓXIMAMENTE</span>
    </div>
</div>

<div id="screen-models" class="screen">
    <div class="logo">LUXURY <span>SEAT</span></div>
    <p class="section-title">YAMAHA</p>
    <p class="section-sub">Selecciona un modelo para verlo en 360°</p>
    <div class="model-grid">
        <div class="model-box" onclick="open360()">
            <img class="model-thumb" src="1 (1).jpg" alt="R15 V4">
            <div class="model-label">R15 V4 SIGNATURE</div>
        </div>
    </div>
    <button class="btn-back" onclick="showScreen('screen-brands')">← Volver a marcas</button>
</div>

<div id="screen-360" class="screen">
    <div class="logo">LUXURY <span>SEAT</span></div>
    <p class="section-title">R15 V4 SIGNATURE</p>
    <p class="section-sub">10 ángulos · Desliza para girar</p>
    <div class="viewer-wrap" id="touch-zone">
        <div class="spinner" id="spinner"></div>
        <img id="viewer-img" src="" alt="">
        <div class="viewer-hint">↔ GIRA CON EL DEDO ↔</div>
    </div>
    <div class="frame-bar" id="frame-bar"></div>
    <button class="btn-back" onclick="showScreen('screen-models')">← Volver a modelos</button>
</div>

<script>
    const frames = [
        "1 (1).jpg","1 (2).jpg","1 (3).jpg","1 (4).jpg","1 (5).jpg",
        "1 (6).jpg","1 (7).jpg","1 (8).jpg","1 (9).jpg","1 (10).jpg"
    ];

    let currentIndex = 0, startX = 0, isDragging = false;
    const cache = {};

    function preloadAll() {
        frames.forEach(url => {
            if (!cache[url]) { const img = new Image(); img.src = url; cache[url] = img; }
        });
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showModels() { preloadAll(); showScreen('screen-models'); }

    function open360() {
        currentIndex = 0;
        buildFrameBar();
        setFrame(0);
        showScreen('screen-360');
    }

    function buildFrameBar() {
        const bar = document.getElementById('frame-bar');
        bar.innerHTML = '';
        frames.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'frame-dot' + (i === 0 ? ' active' : '');
            bar.appendChild(dot);
        });
    }

    function setFrame(index) {
        const img = document.getElementById('viewer-img');
        const spinner = document.getElementById('spinner');
        const url = frames[index];
        document.querySelectorAll('.frame-dot').forEach((d, i) => d.classList.toggle('active', i === index));
        const cached = cache[url];
        if (cached && cached.complete && cached.naturalWidth > 0) {
            img.src = url; img.style.opacity = '1'; spinner.style.display = 'none';
        } else {
            img.style.opacity = '0.3'; spinner.style.display = 'block';
            const loader = new Image();
            loader.onload = () => { img.src = url; img.style.opacity = '1'; spinner.style.display = 'none'; };
            loader.src = url;
        }
    }

    function changeFrame(dir) {
        currentIndex = (currentIndex + dir + frames.length) % frames.length;
        setFrame(currentIndex);
    }

    const touchZone = document.getElementById('touch-zone');
    touchZone.addEventListener('touchstart', e => { startX = e.touches[0].pageX; }, { passive: true });
    touchZone.addEventListener('touchmove', e => {
        const diff = startX - e.touches[0].pageX;
        if (Math.abs(diff) > 15) { changeFrame(diff > 0 ? 1 : -1); startX = e.touches[0].pageX; }
        e.preventDefault();
    }, { passive: false });
    touchZone.addEventListener('mousedown', e => { isDragging = true; startX = e.pageX; });
    document.addEventListener('mouseup', () => { isDragging = false; });
    touchZone.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const diff = startX - e.pageX;
        if (Math.abs(diff) > 15) { changeFrame(diff > 0 ? 1 : -1); startX = e.pageX; }
    });
</script>
</body>
</html>
