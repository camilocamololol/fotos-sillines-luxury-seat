<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxury Seat - Catálogo</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #141414; --border: #2a2a2a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        .pantalla { width: 100%; max-width: 500px; display: none; flex-direction: column; align-items: center; padding: 30px 20px; }
        .pantalla.activa { display: flex; }

        .logo { font-size: 28px; font-weight: 900; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
        .logo span { color: white; }
        .subtitulo { color: #555; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }

        .tarjeta-marca { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin-bottom: 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .tarjeta-marca:active { background: #222; border-color: var(--gold); }
        .tarjeta-marca h2 { font-size: 20px; letter-spacing: 4px; color: var(--gold); }
        .tarjeta-marca.proximamente { opacity: 0.4; cursor: default; }

        .cuadricula-modelos { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; margin-bottom: 30px; }
        .caja-modelo { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
        .caja-modelo:active { border-color: var(--gold); }
        .miniatura-modelo { width: 100%; height: 140px; object-fit: contain; background: #0e0e0e; display: block; border-bottom: 1px solid var(--border); }
        .etiqueta-modelo { padding: 12px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-align: center; text-transform: uppercase; }

        .titulo-seccion { font-size: 18px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; text-align: center; }
        .sub-seccion { font-size: 12px; color: #555; letter-spacing: 1px; margin-bottom: 24px; text-align: center; }

        .contenedor-visor { width: 100%; position: relative; background: #0e0e0e; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; touch-action: none; user-select: none; min-height: 280px; display: flex; align-items: center; justify-content: center; }
        #img-visor { width: 100%; display: block; border-radius: 20px; pointer-events: none; transition: opacity 0.1s; }
        .pista-giro { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); color: var(--gold); font-size: 11px; letter-spacing: 2px; padding: 5px 14px; border-radius: 20px; white-space: nowrap; pointer-events: none; }

        .galeria { width: 100%; overflow-x: auto; display: flex; gap: 8px; margin-top: 14px; padding-bottom: 6px; scrollbar-width: thin; scrollbar-color: var(--gold) #222; }
        .galeria::-webkit-scrollbar { height: 4px; }
        .galeria::-webkit-scrollbar-track { background: #222; border-radius: 4px; }
        .galeria::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
        .miniatura { flex-shrink: 0; width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 2px solid transparent; cursor: pointer; opacity: 0.45; transition: opacity 0.2s, border-color 0.2s; }
        .miniatura.activa { border-color: var(--gold); opacity: 1; }

        .spinner { position: absolute; width: 36px; height: 36px; border: 2px solid #222; border-top-color: var(--gold); border-radius: 50%; animation: girar 0.7s linear infinite; display: none; }
        @keyframes girar { to { transform: rotate(360deg); } }

        .btn-volver { margin-top: 28px; background: none; border: 1px solid #333; color: #666; padding: 10px 28px; border-radius: 8px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        .btn-volver:active { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<!-- PANTALLA: MARCAS -->
<div id="pantalla-marcas" class="pantalla activa">
    <div class="logo">LUXURY <span>SEAT</span></div>
    <p class="subtitulo">Asientos de moto personalizados</p>
    <div class="tarjeta-marca" onclick="mostrarModelos()">
        <h2>YAMAHA</h2>
        <span style="color:#555; font-size:20px;">›</span>
    </div>
    <div class="tarjeta-marca proximamente">
        <h2>HONDA</h2>
        <span style="color:#333; font-size:11px; letter-spacing:1px;">PRÓXIMAMENTE</span>
    </div>
    <div class="tarjeta-marca proximamente">
        <h2>SUZUKI</h2>
        <span style="color:#333; font-size:11px; letter-spacing:1px;">PRÓXIMAMENTE</span>
    </div>
</div>

<!-- PANTALLA: MODELOS -->
<div id="pantalla-modelos" class="pantalla">
    <div class="logo">LUXURY <span>SEAT</span></div>
    <p class="titulo-seccion">YAMAHA</p>
    <p class="sub-seccion">Selecciona un modelo para verlo en 360°</p>
    <div class="cuadricula-modelos">
        <div class="caja-modelo" onclick="abrir360('azul')">
            <img class="miniatura-modelo" src="1.png" alt="MT-15 Edición Azul">
            <div class="etiqueta-modelo" style="color:#4a9eff;">MT-15 EDICIÓN AZUL</div>
        </div>
        <div class="caja-modelo" onclick="abrir360('naranja')">
            <img class="miniatura-modelo" src="5.png" alt="MT-15 Edición Naranja">
            <div class="etiqueta-modelo" style="color:#ff8c00;">MT-15 EDICIÓN NARANJA</div>
        </div>
    </div>
    <button class="btn-volver" onclick="mostrarPantalla('pantalla-marcas')">← Volver a marcas</button>
</div>

<!-- PANTALLA: VISOR 360 -->
<div id="pantalla-360" class="pantalla">
    <div class="logo">LUXURY <span>SEAT</span></div>
    <p class="titulo-seccion" id="nombre-modelo"></p>
    <p class="sub-seccion" id="sub-modelo"></p>
    <div class="contenedor-visor" id="zona-tactil">
        <div class="spinner" id="spinner"></div>
        <img id="img-visor" src="" alt="">
        <div class="pista-giro">↔ GIRA CON EL DEDO ↔</div>
    </div>
    <div class="galeria" id="galeria"></div>
    <button class="btn-volver" onclick="mostrarPantalla('pantalla-modelos')">← Volver a modelos</button>
</div>

<script>
    const baseDatos = {
        azul: {
            nombre: 'MT-15 EDICIÓN AZUL',
            color: '#4a9eff',
            fotogramas: ['1.png','2.png','3.png','4.png','6.png','7.png','8.png','9.png']
        },
        naranja: {
            nombre: 'MT-15 EDICIÓN NARANJA',
            color: '#ff8c00',
            fotogramas: ['5.png']
        }
    };

    let fotogramasActuales = [];
    let indiceActual = 0;
    let inicioX = 0;
    let arrastrando = false;
    const cache = {};

    function precargarTodo(urls) {
        urls.forEach(url => {
            if (!cache[url]) { const img = new Image(); img.src = url; cache[url] = img; }
        });
    }

    function mostrarPantalla(id) {
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
        document.getElementById(id).classList.add('activa');
    }

    function mostrarModelos() {
        Object.values(baseDatos).forEach(m => precargarTodo(m.fotogramas));
        mostrarPantalla('pantalla-modelos');
    }

    function abrir360(modeloId) {
        const modelo = baseDatos[modeloId];
        fotogramasActuales = modelo.fotogramas;
        indiceActual = 0;
        document.getElementById('nombre-modelo').textContent = modelo.nombre;
        document.getElementById('nombre-modelo').style.color = modelo.color;
        const total = modelo.fotogramas.length;
        document.getElementById('sub-modelo').textContent = total === 1
            ? '1 ángulo disponible'
            : `${total} ángulos · Desliza o toca una foto`;
        construirGaleria(modelo.color);
        establecerFotograma(0);
        mostrarPantalla('pantalla-360');
    }

    function construirGaleria(color) {
        const galeria = document.getElementById('galeria');
        galeria.innerHTML = '';
        fotogramasActuales.forEach((url, i) => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'miniatura' + (i === 0 ? ' activa' : '');
            img.id = 'mini-' + i;
            img.style.borderColor = i === 0 ? color : 'transparent';
            img.onclick = () => {
                document.querySelectorAll('.miniatura').forEach(m => {
                    m.classList.remove('activa');
                    m.style.borderColor = 'transparent';
                });
                img.classList.add('activa');
                img.style.borderColor = color;
                establecerFotograma(i);
            };
            galeria.appendChild(img);
        });
    }

    function establecerFotograma(indice) {
        const img = document.getElementById('img-visor');
        const spinner = document.getElementById('spinner');
        const url = fotogramasActuales[indice];
        indiceActual = indice;

        const mini = document.getElementById('mini-' + indice);
        if (mini) mini.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

        const enCache = cache[url];
        if (enCache && enCache.complete && enCache.naturalWidth > 0) {
            img.src = url; img.style.opacity = '1'; spinner.style.display = 'none';
        } else {
            img.style.opacity = '0.3'; spinner.style.display = 'block';
            const cargador = new Image();
            cargador.onload = () => { img.src = url; img.style.opacity = '1'; spinner.style.display = 'none'; };
            cargador.src = url;
        }
    }

    function cambiarFotograma(dir) {
        const nuevo = (indiceActual + dir + fotogramasActuales.length) % fotogramasActuales.length;
        establecerFotograma(nuevo);
        document.querySelectorAll('.miniatura').forEach((m, i) => {
            const activo = i === nuevo;
            m.classList.toggle('activa', activo);
        });
    }

    const zonaTactil = document.getElementById('zona-tactil');
    zonaTactil.addEventListener('touchstart', e => { inicioX = e.touches[0].pageX; }, { passive: true });
    zonaTactil.addEventListener('touchmove', e => {
        const diff = inicioX - e.touches[0].pageX;
        if (Math.abs(diff) > 15) { cambiarFotograma(diff > 0 ? 1 : -1); inicioX = e.touches[0].pageX; }
        e.preventDefault();
    }, { passive: false });

    zonaTactil.addEventListener('mousedown', e => { arrastrando = true; inicioX = e.pageX; });
    document.addEventListener('mouseup', () => { arrastrando = false; });
    zonaTactil.addEventListener('mousemove', e => {
        if (!arrastrando) return;
        const diff = inicioX - e.pageX;
        if (Math.abs(diff) > 15) { cambiarFotograma(diff > 0 ? 1 : -1); inicioX = e.pageX; }
    });
</script>
</body>
</html>
